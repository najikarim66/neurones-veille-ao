name: Veille AO

on:
  schedule:
    # Cron en UTC. Casablanca = UTC+1 (UTC+0 en hiver, UTC+1 en ete - on prend ete)
    # Pour 7h00 Casablanca : 06:00 UTC
    # Pour 15h00 Casablanca : 14:00 UTC
    # Pour modifier les horaires, edite ces lignes (format cron : min hour day month dow)
    - cron: "0 6 * * 1-5"   # 7h00 Casablanca, lundi-vendredi
    - cron: "0 14 * * 1-5"  # 15h00 Casablanca, lundi-vendredi
  workflow_dispatch: {}     # Permet aussi un declenchement manuel via GitHub UI

jobs:
  veille:
    runs-on: [self-hosted, maroc]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Runner self-hosted Windows : on n'utilise PAS actions/setup-python
      # (son auto-install d'un .exe echoue hors runner GitHub-hosted).
      # On batit un venv dedie sur le Python local de la machine.
      - name: Setup venv and install dependencies
        shell: powershell
        run: |
          $py = "C:\Users\naji\AppData\Local\Python\bin\python.exe"
          $venv = "C:\actions-runner\veille-venv"
          if (-not (Test-Path $venv)) { & $py -m venv $venv }
          & "$venv\Scripts\python.exe" -m pip install --upgrade pip
          & "$venv\Scripts\python.exe" -m pip install -r requirements.txt

      - name: Install Playwright Chromium
        shell: powershell
        run: |
          & "C:\actions-runner\veille-venv\Scripts\python.exe" -m playwright install chromium

      - name: Run pipeline
        shell: powershell
        env:
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          & "C:\actions-runner\veille-venv\Scripts\python.exe" -m src.pipeline
