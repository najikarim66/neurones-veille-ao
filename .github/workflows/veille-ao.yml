name: Veille AO

on:
  schedule:
    # Cron en UTC. Casablanca = UTC+1 (UTC+0 en hiver, UTC+1 en ete - on prend ete)
    # Pour 7h00 Casablanca : 06:00 UTC
    # Pour 15h00 Casablanca : 14:00 UTC
    # Pour modifier les horaires, edite ces lignes (format cron : min hour day month dow)
    - cron: "0 6 * * 1-5"   # 7h00 Casablanca, lundi-vendredi
    - cron: "0 14 * * 1-5"  # 15h00 Casablanca, lundi-vendredi
  workflow_dispatch: {}     # Permet aussi un declenchement manuel via GitHub UI

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          playwright install --with-deps chromium

      - name: Run pipeline
        env:
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python -m src.pipeline
