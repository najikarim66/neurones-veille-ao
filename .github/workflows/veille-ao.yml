name: Veille AO

on:
  # Plus de cron GitHub (imprecis : retards de plusieurs heures). Declenchement via
  # workflow_dispatch uniquement : manuel (UI) ou tache planifiee locale sur le PC
  # marocain (gh workflow run veille-ao.yml) a l'heure voulue, executee par le runner.
  workflow_dispatch: {}

jobs:
  veille:
    runs-on: [self-hosted, maroc]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Runner self-hosted Windows : on n'utilise PAS actions/setup-python
      # (son auto-install d'un .exe echoue hors runner GitHub-hosted).
      # On batit un venv dedie sur le Python local de la machine.
      - name: Setup venv and install dependencies
        shell: powershell
        run: |
          $py = "C:\Users\naji\AppData\Local\Python\bin\python.exe"
          $venv = "C:\actions-runner\veille-venv"
          if (-not (Test-Path $venv)) { & $py -m venv $venv }
          & "$venv\Scripts\python.exe" -m pip install --upgrade pip
          & "$venv\Scripts\python.exe" -m pip install -r requirements.txt

      - name: Install Playwright Chromium
        shell: powershell
        run: |
          & "C:\actions-runner\veille-venv\Scripts\python.exe" -m playwright install chromium

      - name: Run pipeline
        shell: powershell
        env:
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_FROM: no-reply@neurones.ma
          GRAPH_FROM_NAME: Veille AO Neurones
        run: |
          & "C:\actions-runner\veille-venv\Scripts\python.exe" -m src.pipeline
